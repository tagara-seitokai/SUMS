<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUMS メンバー詳細</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="members-body">
  <div class="members-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <button class="back-btn" id="backBtn">← メンバー一覧に戻る</button>
      <button class="btn btn-sm btn-outline-primary" id="editToggleBtn">✏️ 編集</button>
    </div>

    <div class="detail-card">
      <h4 id="detailName" class="mb-3"></h4>
      <div id="viewMode">
        <div class="info-grid" id="basicInfo"></div>
      </div>
      <div id="editMode" class="edit-section" style="display:none;">
        <div class="row g-2">
          <div class="col-md-6"><label class="form-label small">氏名</label><input type="text" id="editName" class="form-control"></div>
          <div class="col-md-6"><label class="form-label small">出席番号</label><input type="number" id="editAttNum" class="form-control"></div>
          <div class="col-md-6"><label class="form-label small">職種</label>
            <select id="editPosition" class="form-select">
              <option value="顧問">顧問</option><option value="会長">会長</option><option value="副会長">副会長</option>
              <option value="書記">書記</option><option value="会計">会計</option><option value="メンバー">メンバー</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label small">権限</label>
            <select id="editRole" class="form-select">
              <option value="Member">一般権限</option>
              <option value="President">最高権限</option>
            </select>
          </div>
          <div class="col-md-6"><label class="form-label small">メールアドレス</label><input type="email" id="editEmail" class="form-control"></div>
          <div class="col-md-6"><label class="form-label small">ステータス</label>
            <select id="editStatus" class="form-select"><option value="1">Active</option><option value="0">Inactive</option></select>
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-sm btn-primary" id="saveEditBtn">保存</button>
          <button class="btn btn-sm btn-outline-secondary ms-2" id="cancelEditBtn">キャンセル</button>
        </div>
      </div>

      <h5 class="mt-4">📌 現在の担当タスク</h5>
      <div id="taskList"><span class="text-muted">読み込み中…</span></div>

      <h5 class="mt-4">🤝 担当プロジェクト</h5>
      <div id="projectList"><span class="text-muted">読み込み中…</span></div>

      <h5 class="mt-4">📋 報告ケース</h5>
      <div id="caseList"><span class="text-muted">読み込み中…</span></div>

      <h5 class="mt-4">📊 今年度の統計</h5>
      <div class="row g-2" id="statsSection">
        <div class="col-6"><div class="stat-box">✅ 担当タスク<br><strong id="statTasks">-</strong></div></div>
        <div class="col-6"><div class="stat-box">📁 担当プロジェクト<br><strong id="statProjects">-</strong></div></div>
        <div class="col-6"><div class="stat-box">📋 報告ケース<br><strong id="statCases">-</strong></div></div>
        <div class="col-6"><div class="stat-box">📅 会議出席率<br><strong>-</strong></div></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './js/firebase-init.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
    import {
      doc, getDoc, updateDoc, serverTimestamp,
      collection, getDocs, query, where
    } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

    const urlParams = new URLSearchParams(window.location.search);
    const memberId = urlParams.get('id');
    if (!memberId) { window.location.href = 'members.html'; }

    let memberData = null;
    const backBtn = document.getElementById('backBtn');
    const editToggleBtn = document.getElementById('editToggleBtn');
    const viewMode = document.getElementById('viewMode');
    const editMode = document.getElementById('editMode');
    const saveEditBtn = document.getElementById('saveEditBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');

    document.addEventListener('DOMContentLoaded', () => {
      onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        await loadMember();
      });
      backBtn.addEventListener('click', () => window.location.href = 'members.html');
      editToggleBtn.addEventListener('click', toggleEdit);
      cancelEditBtn.addEventListener('click', toggleEdit);
      saveEditBtn.addEventListener('click', saveEdit);
    });

    async function loadMember() {
      const snap = await getDoc(doc(db, 'members', memberId));
      if (!snap.exists()) { window.location.href = 'members.html'; return; }
      memberData = { id: snap.id, ...snap.data() };
      document.getElementById('detailName').textContent = memberData.name;
      renderView();
      fillEditForm();
      await loadRelatedData();
    }

    function renderView() {
      const roleLabel = memberData.role === 'President' ? '最高権限' : '一般権限';
      document.getElementById('basicInfo').innerHTML = `
        <div class="info-item"><label>出席番号</label>${memberData.attendanceNumber || '-'}</div>
        <div class="info-item"><label>職種</label>${memberData.position || 'メンバー'}</div>
        <div class="info-item"><label>メールアドレス</label>${memberData.email || '未設定'}</div>
        <div class="info-item"><label>権限</label>${roleLabel}</div>
        <div class="info-item"><label>ステータス</label>${memberData.active ? 'Active' : 'Inactive'}</div>
        <div class="info-item"><label>作成日</label>${memberData.createdAt?.toDate().toLocaleDateString('ja-JP') || '-'}</div>
      `;
    }

    function fillEditForm() {
      document.getElementById('editName').value = memberData.name || '';
      document.getElementById('editAttNum').value = memberData.attendanceNumber || 0;
      document.getElementById('editPosition').value = memberData.position || 'メンバー';
      document.getElementById('editRole').value = (memberData.role === 'President') ? 'President' : 'Member';
      document.getElementById('editEmail').value = memberData.email || '';
      document.getElementById('editStatus').value = memberData.active ? '1' : '0';
    }

    function toggleEdit() {
      if (editMode.style.display === 'none') {
        editMode.style.display = 'block';
        viewMode.style.display = 'none';
        editToggleBtn.textContent = '👁️ 表示に戻る';
        fillEditForm();
      } else {
        editMode.style.display = 'none';
        viewMode.style.display = 'block';
        editToggleBtn.textContent = '✏️ 編集';
      }
    }

    async function saveEdit() {
      const name = document.getElementById('editName').value.trim();
      const attNum = parseInt(document.getElementById('editAttNum').value) || 0;
      const position = document.getElementById('editPosition').value;
      const role = document.getElementById('editRole').value;
      const email = document.getElementById('editEmail').value.trim();
      const active = document.getElementById('editStatus').value === '1';
      if (!name) { alert('氏名を入力してください。'); return; }
      saveEditBtn.disabled = true; saveEditBtn.textContent = '保存中…';
      try {
        await updateDoc(doc(db, 'members', memberId), {
          name, attendanceNumber: attNum, position, role, email, active, updatedAt: serverTimestamp()
        });
        memberData = { ...memberData, name, attendanceNumber: attNum, position, role, email, active };
        renderView();
        toggleEdit();
        await loadRelatedData();
      } catch (e) { alert('保存に失敗しました。'); }
      saveEditBtn.disabled = false; saveEditBtn.textContent = '保存';
    }

    // ========== 关联数据加载 ==========
    async function loadRelatedData() {
      const memberName = memberData.name;
      await Promise.all([
        loadTasks(memberName),
        loadProjects(memberName),
        loadCases(memberName)
      ]);
    }

    async function loadTasks(memberName) {
      const container = document.getElementById('taskList');
      try {
        const q = query(collection(db, 'tasks'), where('assignee', '==', memberName));
        const snap = await getDocs(q);
        let html = '';
        if (snap.empty) {
          html = '<div class="text-muted small">担当タスクはありません</div>';
        } else {
          snap.forEach(doc => {
            const t = doc.data();
            const statusText = t.status === 'completed' ? '完了' : '進行中';
            const dotClass = t.status === 'completed' ? 'status-completed' : 'status-running';
            html += `<div class="data-item"><span class="status-dot ${dotClass}"></span> ${escapeHtml(t.title || '無題')} (${statusText})</div>`;
          });
        }
        document.getElementById('statTasks').textContent = snap.size;
        container.innerHTML = html;
      } catch (e) {
        console.error(e);
        container.innerHTML = '<div class="text-muted small">読み込みに失敗しました</div>';
      }
    }

    async function loadProjects(memberName) {
      const container = document.getElementById('projectList');
      try {
        const q = query(collection(db, 'projects'), where('owner', '==', memberName));
        const snap = await getDocs(q);
        let html = '';
        if (snap.empty) {
          html = '<div class="text-muted small">担当プロジェクトはありません</div>';
        } else {
          snap.forEach(doc => {
            const p = doc.data();
            const statusText = p.status === 'completed' ? '完了' : p.status === 'active' ? '進行中' : p.status;
            html += `<div class="data-item">📁 ${escapeHtml(p.name || '無題')} (${statusText})</div>`;
          });
        }
        document.getElementById('statProjects').textContent = snap.size;
        container.innerHTML = html;
      } catch (e) {
        console.error(e);
        container.innerHTML = '<div class="text-muted small">読み込みに失敗しました</div>';
      }
    }

    async function loadCases(memberName) {
      const container = document.getElementById('caseList');
      try {
        const q = query(collection(db, 'cases'), where('reporter', '==', memberName));
        const snap = await getDocs(q);
        let html = '';
        if (snap.empty) {
          html = '<div class="text-muted small">報告ケースはありません</div>';
        } else {
          snap.forEach(doc => {
            const c = doc.data();
            const statusText = c.status === 'resolved' ? '解決済' : '未解決';
            html += `<div class="data-item">📋 ${escapeHtml(c.title || '無題')} (${statusText})</div>`;
          });
        }
        document.getElementById('statCases').textContent = snap.size;
        container.innerHTML = html;
      } catch (e) {
        console.error(e);
        container.innerHTML = '<div class="text-muted small">読み込みに失敗しました</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
  </script>
</body>
</html>
