<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUMS タスク管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="schedule-body">
  <div class="container-custom">
    <div class="toolbar">
      <div class="toolbar-left">
        <a href="dashboard.html" class="btn btn-sm btn-outline-secondary toolbar-back">←</a>
        <h4 class="page-title">✅ タスク</h4>
      </div>
      <button class="add-task-btn" id="addTaskBtn">+ 新規タスク</button>
    </div>

    <div class="filter-bar">
      <select class="form-select form-select-sm" id="filterStatus">
        <option value="all">すべて</option>
        <option value="open">未着手</option>
        <option value="in_progress">進行中</option>
        <option value="completed">完了</option>
        <option value="overdue">期限超過</option>
      </select>
      <select class="form-select form-select-sm" id="filterAssignee">
        <option value="all">担当者：すべて</option>
      </select>
    </div>

    <div id="taskList">
      <div class="empty-hint">タスクがありません</div>
    </div>
  </div>

  <!-- 新建任务弹窗 -->
  <div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">
        <div class="modal-header"><h5 class="modal-title">新規タスク作成</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">タスク名</label><input type="text" class="form-control" id="taskName"></div>
          <div class="mb-3"><label class="form-label">担当者</label><select class="form-select" id="taskAssignee"></select></div>
          <div class="mb-3"><label class="form-label">プロジェクト</label><select class="form-select" id="taskProject"></select></div>
          <div class="mb-3"><label class="form-label">内容</label><textarea class="form-control" id="taskDesc" rows="3"></textarea></div>
          <div class="mb-3"><label class="form-label">締切日</label><input type="date" class="form-control" id="taskDue"></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button><button type="button" class="btn btn-sm btn-primary" id="saveTaskBtn">保存</button></div>
      </div>
    </div>
  </div>

  <!-- 任务详情弹窗 -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">
        <div class="modal-header"><h5 class="modal-title" id="detailTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div id="viewMode">
            <p><strong>担当者：</strong><span id="viewAssignee"></span></p>
            <p><strong>プロジェクト：</strong><span id="viewProject"></span></p>
            <p><strong>締切日：</strong><span id="viewDue"></span></p>
            <p><strong>ステータス：</strong><span id="viewStatus"></span></p>
            <p><strong>内容：</strong><span id="viewDesc"></span></p>
          </div>
          <div id="editMode" style="display:none;">
            <div class="mb-3"><label class="form-label">タスク名</label><input type="text" class="form-control" id="editTitle"></div>
            <div class="mb-3"><label class="form-label">担当者</label><input type="text" class="form-control" id="editAssignee" disabled></div>
            <div class="mb-3"><label class="form-label">プロジェクト</label><select class="form-select" id="editProject"></select></div>
            <div class="mb-3"><label class="form-label">内容</label><textarea class="form-control" id="editDesc" rows="3"></textarea></div>
            <div class="mb-3"><label class="form-label">締切日</label><input type="date" class="form-control" id="editDue"></div>
            <div class="mb-3">
              <label class="form-label">ステータス</label>
              <select class="form-select" id="editStatus">
                <option value="open">未着手</option>
                <option value="in_progress">進行中</option>
                <option value="completed">完了</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <div id="adminActions" style="display:none;">
            <button class="btn btn-sm btn-primary" id="editToggleBtn">編集</button>
            <button class="btn btn-sm btn-success" id="saveEditBtn" style="display:none;">保存</button>
          </div>
          <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/tasks.js"></script>
</body>
</html>
