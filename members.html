<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUMS メンバー管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="members-body">
  <div class="members-container">
    <div class="toolbar">
      <div class="toolbar-left">
        <a href="dashboard.html" class="btn btn-sm btn-outline-secondary toolbar-back">←</a>
        <h4 class="page-title">👥 メンバー</h4>
      </div>
      <button class="add-btn" id="addMemberBtn">+ メンバーを追加</button>
    </div>

    <div class="member-list" id="memberList">
      <div class="text-center py-4 text-muted">読み込み中…</div>
    </div>

    <!-- 添加成员表单 -->
    <div id="addFormCard" class="detail-card mt-3" style="display:none;">
      <h5>新規メンバーを追加</h5>
      <div class="row g-2 mt-2">
        <div class="col-md-6">
          <label class="form-label small">氏名</label>
          <input type="text" id="addName" class="form-control" placeholder="山田太郎">
        </div>
        <div class="col-md-6">
          <label class="form-label small">出席番号</label>
          <input type="number" id="addAttNum" class="form-control" placeholder="10">
        </div>
        <div class="col-md-6">
          <label class="form-label small">職種</label>
          <select id="addPosition" class="form-select">
            <option value="顧問">顧問</option>
            <option value="会長">会長</option>
            <option value="副会長">副会長</option>
            <option value="書記">書記</option>
            <option value="会計">会計</option>
            <option value="メンバー" selected>メンバー</option>
          </select>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-sm btn-primary" id="saveAddBtn">保存</button>
        <button class="btn btn-sm btn-outline-secondary ms-2" id="cancelAddBtn">キャンセル</button>
      </div>
      <div id="addError" class="error-message mt-2"></div>
    </div>
  </div>

  <script type="module" src="js/members.js"></script>
</body>
</html>
