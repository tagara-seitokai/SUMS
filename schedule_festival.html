<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文化祭シフト</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    /* 文化祭シフト专用样式（内嵌保证可用） */
    .shift-slot {
      border-radius: 6px;
      padding: 0.3rem 0.4rem;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .shift-morning { background: #DBEAFE; color: #1E40AF; }
    .shift-afternoon { background: #FEF3C7; color: #92400E; }
    .shift-allday { background: #D1FAE5; color: #065F46; }
    .shift-none {
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 4px,
        #CBD5E1 4px,
        #CBD5E1 6px
      );
      color: #94A3B8;
    }
    .shift-select {
      font-size: 0.75rem;
      padding: 0.2rem 0.3rem;
      border-radius: 6px;
      border: 1px solid #CBD5E1;
      width: 100%;
    }
    .legend {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: var(--sums-text-muted);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }
    .legend-morning { background: #DBEAFE; }
    .legend-afternoon { background: #FEF3C7; }
    .legend-allday { background: #D1FAE5; }
    .legend-none {
      background: repeating-linear-gradient(-45deg, transparent, transparent 4px, #CBD5E1 4px, #CBD5E1 6px);
    }
    /* 周导航 */
    .week-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .week-label {
      font-weight: 600;
      font-size: 0.95rem;
    }
  </style>
</head>
<body class="schedule-body">
  <div class="container-custom">
    <div class="toolbar">
      <div class="toolbar-left">
        <a href="schedules.html" class="btn btn-sm btn-outline-secondary toolbar-back">←</a>
        <h4 class="page-title">🎪 文化祭シフト</h4>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-secondary" id="setDatesBtn">📅 期間設定</button>
        <button class="add-btn ms-2" id="addMemberBtn">+ 臨時メンバーを追加</button>
      </div>
    </div>

    <!-- 时间段说明 -->
    <div class="legend">
      <div class="legend-item"><div class="legend-color legend-morning"></div> 午前 (8:30-12:30)</div>
      <div class="legend-item"><div class="legend-color legend-afternoon"></div> 午後 (12:00-16:00)</div>
      <div class="legend-item"><div class="legend-color legend-allday"></div> 終日 (8:30-16:00)</div>
      <div class="legend-item"><div class="legend-color legend-none"></div> シフトなし</div>
    </div>

    <!-- 周导航 -->
    <div class="week-nav" id="weekNav">
      <button class="btn btn-sm btn-outline-secondary" id="prevWeekBtn" disabled>◀ 前週</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="btn btn-sm btn-outline-secondary" id="nextWeekBtn">次週 ▶</button>
    </div>

    <div class="shift-table-wrapper">
      <table class="shift-table" id="shiftTable">
        <thead id="shiftTableHead"></thead>
        <tbody id="shiftTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 无权限弹窗 -->
  <div class="modal fade" id="noPermissionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">
        <div class="modal-header"><h5 class="modal-title">権限がありません</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><p>シフトを編集するには最高権限が必要です。</p></div>
        <div class="modal-footer"><button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">閉じる</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/schedule_festival.js"></script>
</body>
</html>
