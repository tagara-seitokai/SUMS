<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUMS すべてのアクティビティ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="schedule-body">
  <div class="container-custom">
    <div class="toolbar">
      <div class="toolbar-left">
        <a href="dashboard.html" class="btn btn-sm btn-outline-secondary toolbar-back">←</a>
        <h4 class="page-title">🕘 すべてのアクティビティ</h4>
      </div>
    </div>
    <div class="activity-feed" id="allActivityFeed"></div>
  </div>

  <!-- 活动详情弹窗 -->
  <div class="modal fade" id="activityDetailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">
        <div class="modal-header">
          <h5 class="modal-title">アクティビティ詳細</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p><strong>日時：</strong><span id="activityDetailTime"></span></p>
          <p><strong>操作者：</strong><span id="activityDetailUser"></span></p>
          <p><strong>内容：</strong><span id="activityDetailAction"></span></p>
          <p><strong>関連タスク：</strong><span id="activityDetailTask"></span></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">閉じる</button>
          <a href="#" id="activityDetailLink" class="btn btn-sm btn-primary">タスクを開く</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/activities.js"></script>
</body>
</html>
