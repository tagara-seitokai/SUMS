<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUMS カレンダー</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="schedule-body">
  <div class="container-custom">
    <div class="toolbar">
      <div class="toolbar-left">
        <a href="schedules.html" class="btn btn-sm btn-outline-secondary toolbar-back">←</a>
        <h4 class="page-title">📆 カレンダー</h4>
      </div>
      <button class="add-btn" id="addEventBtn">+ 追加予定</button>
    </div>

    <!-- 图例 -->
    <div class="legend-bar">
      <div class="legend-item"><div class="legend-dot legend-task-open"></div> タスク：未着手</div>
      <div class="legend-item"><div class="legend-dot legend-task-progress"></div> 進行中</div>
      <div class="legend-item"><div class="legend-dot legend-task-completed"></div> 完了</div>
      <div class="legend-item"><div class="legend-dot legend-task-overdue"></div> 期限超過</div>
      <div class="legend-item"><div class="legend-dot legend-event"></div> 追加予定</div>
    </div>

    <div class="calendar-card" id="calendarContainer">
      <!-- 月视图动态渲染 -->
    </div>
  </div>

  <!-- 新增追加予定弹窗 -->
  <div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">
        <div class="modal-header"><h5 class="modal-title">追加予定</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">タイトル</label><input type="text" class="form-control" id="eventTitle"></div>
          <div class="row mb-3">
            <div class="col-6"><label class="form-label">日付</label><input type="date" class="form-control" id="eventDate"></div>
            <div class="col-6"><label class="form-label">時間</label><input type="text" class="form-control" id="eventTime" placeholder="例: 9:00-12:00"></div>
          </div>
          <div class="mb-3"><label class="form-label">場所</label><input type="text" class="form-control" id="eventLocation"></div>
          <div class="mb-3"><label class="form-label">参加者</label><input type="text" class="form-control" id="eventParticipants"></div>
          <div class="mb-3"><label class="form-label">説明</label><textarea class="form-control" id="eventDesc" rows="2"></textarea></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button><button type="button" class="btn btn-sm btn-primary" id="saveEventBtn">保存</button></div>
      </div>
    </div>
  </div>

  <!-- 任务详情弹窗 -->
  <div class="modal fade" id="taskDetailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">
        <div class="modal-header"><h5 class="modal-title" id="taskDetailTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <p><strong>種別：</strong>タスク</p>
          <p><strong>担当者：</strong><span id="taskDetailAssignee"></span></p>
          <p><strong>プロジェクト：</strong><span id="taskDetailProject"></span></p>
          <p><strong>締切日：</strong><span id="taskDetailDue"></span></p>
          <p><strong>ステータス：</strong><span id="taskDetailStatus"></span></p>
          <p><strong>内容：</strong><span id="taskDetailDesc"></span></p>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">閉じる</button></div>
      </div>
    </div>
  </div>

  <!-- 追加予定详情弹窗 -->
  <div class="modal fade" id="eventDetailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">
        <div class="modal-header"><h5 class="modal-title" id="eventDetailTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <p><strong>種別：</strong>追加予定</p>
          <p><strong>日時：</strong><span id="eventDetailDateTime"></span></p>
          <p><strong>場所：</strong><span id="eventDetailLocation"></span></p>
          <p><strong>参加者：</strong><span id="eventDetailParticipants"></span></p>
          <p><strong>説明：</strong><span id="eventDetailDesc"></span></p>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">閉じる</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/schedule_calendar.js"></script>
</body>
</html>
