<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>部活動シフト</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="schedule-body">
  <div class="container-custom">
    <div class="toolbar">
      <div class="toolbar-left">
        <a href="schedules.html" class="btn btn-sm btn-outline-secondary toolbar-back">←</a>
        <h4 class="page-title">🏫 部活動シフト</h4>
      </div>
      <button class="add-btn" id="addMemberBtn">+ 臨時メンバーを追加</button>
    </div>
    <div class="shift-table-wrapper">
      <table class="shift-table" id="clubTable">
        <thead id="clubTableHead"></thead>
        <tbody id="clubTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 无权限弹窗 -->
  <div class="modal fade" id="noPermissionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">
        <div class="modal-header">
          <h5 class="modal-title">権限がありません</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p>シフトを編集するには最高権限が必要です。</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/schedule_club.js"></script>
</body>
</html>
