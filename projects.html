<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUMS プロジェクト管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="schedule-body">
  <div class="container-custom">
    <div class="toolbar">
      <div class="toolbar-left">
        <a href="dashboard.html" class="btn btn-sm btn-outline-secondary toolbar-back">←</a>
        <h4 class="page-title">📁 プロジェクト</h4>
      </div>
      <button class="add-btn" id="addProjectBtn">+ 新規プロジェクト</button>
    </div>

    <div class="filter-bar">
      <select class="form-select form-select-sm" id="filterStatus">
        <option value="all">すべて</option>
        <option value="active">進行中</option>
        <option value="paused">一時停止</option>
        <option value="completed">完了</option>
      </select>
    </div>

    <div id="projectList">
      <div class="empty-hint">プロジェクトがありません</div>
    </div>
  </div>

  <!-- 新建项目弹窗 -->
  <div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">
        <div class="modal-header"><h5 class="modal-title">新規プロジェクト作成</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">プロジェクト名</label><input type="text" class="form-control" id="projectName"></div>
          <div class="mb-3"><label class="form-label">担当者</label><select class="form-select" id="projectOwner"></select></div>
          <div class="mb-3"><label class="form-label">説明</label><textarea class="form-control" id="projectDesc" rows="2"></textarea></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button><button type="button" class="btn btn-sm btn-primary" id="saveProjectBtn">保存</button></div>
      </div>
    </div>
  </div>

  <!-- 项目详情弹窗 -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content rounded-4">
        <div class="modal-header"><h5 class="modal-title" id="detailTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <!-- 查看模式 -->
          <div id="viewMode">
            <p><strong>担当者：</strong><span id="viewOwner"></span></p>
            <p><strong>ステータス：</strong><span id="viewStatus"></span></p>
            <div class="progress-bar-wrap mb-3"><div class="progress-bar-fill" id="progressBar"></div></div>
            <hr>
            <h6 class="mb-2">📋 タスク一覧</h6>
            <ul class="task-list-inline" id="taskList"></ul>
          </div>
          <!-- 编辑模式（仅最高权限可见） -->
          <div id="editMode" style="display:none;">
            <div class="mb-3"><label class="form-label">プロジェクト名</label><input type="text" class="form-control" id="editTitle"></div>
            <div class="mb-3"><label class="form-label">担当者</label><select class="form-select" id="editOwner"></select></div>
            <div class="mb-3"><label class="form-label">説明</label><textarea class="form-control" id="editDesc" rows="2"></textarea></div>
            <div class="mb-3">
              <label class="form-label">ステータス</label>
              <select class="form-select" id="editStatus">
                <option value="active">進行中</option>
                <option value="paused">一時停止</option>
                <option value="completed">完了</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <div id="adminActions" style="display:none;">
            <button class="btn btn-sm btn-primary" id="editToggleBtn">編集</button>
            <button class="btn btn-sm btn-success" id="saveEditBtn" style="display:none;">保存</button>
          </div>
          <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 无权限弹窗 -->
  <div class="modal fade" id="noPermissionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4">
        <div class="modal-header"><h5 class="modal-title">権限がありません</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><p>この操作には最高権限が必要です。</p></div>
        <div class="modal-footer"><button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">閉じる</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/projects.js"></script>
</body>
</html>
